#cloud-config
network:
  version: 1
  config:
  - type: physical
    name: eth0
    mtu: 1568
  - type: bridge
    name: br0
    mtu: 1568
    subnets:
      - address: *eth0-private
        type: static
        gateway: *default-gateway
        dns_nameservers:
        - *eth0-dns1
    bridge_interfaces:
      - eth0
kernel_parameters:
  sim:
    - sim_geneve_enabled=1
    - sim_geneve_br_dev=br0
  fw:
    - fwtls_bridge_mode_inspection=1
    - fw_geneve_enabled=1
bootcmd:
  - $CGEDIR/scripts/hairpin_on.sh eth0 br0
runcmd:
  - |
    python3 /etc/cloud_config.py sicKey=\"${SICKey}\" installationType=\"gwlb\" osVersion=\"${OsVersion}\" allowUploadDownload=\"${AllowUploadDownload}\" templateVersion=\"${TemplateVersion}\" templateName=\"autoscale_gwlb\" templateType=\"terraform\" shell=\"${Shell}\" hostName=\"${Hostname}\" ntpPrimary=\"${NTPPrimary}\" ntpSecondary=\"${NTPSecondary}\" passwordHash=\"${PasswordHash}\" bootstrapScript64=\"${GatewayBootstrapScript}\"
